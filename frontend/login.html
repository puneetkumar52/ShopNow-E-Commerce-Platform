<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Bada Bazar</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="logo">Bada <span>Bazar</span></div>
  <div class="subtitle">Login to your account 🔐</div>

  <div class="msg-box" id="msg-box"></div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="abc@gmail.com" />
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" />
  </div>

  <button class="form-submit-btn" onclick="doLogin()">Login →</button>

  <div class="auth-switch">
    Don't have an account? <a href="signup.html">Sign Up here</a>
  </div>

  <div style="text-align:center; margin-top:14px;">
    <a href="index.html" style="font-size:13px; color:var(--gray);">← Back to Home</a>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script src="common.js"></script>
<script>
  // If already logged in, redirect
  if (getUser()) {
    window.location.href = "index.html";
  }

  function showMsg(text, isError) {
    var box = document.getElementById("msg-box");
    box.textContent = text;
    box.className = "msg-box " + (isError ? "msg-error" : "msg-success");
    box.style.display = "block";
  }

  function doLogin() {
    var email = document.getElementById("email").value.trim();
    var password = document.getElementById("password").value;

    if (!email || !password) {
      showMsg("Please fill in all fields", true);
      return;
    }

    var btn = document.querySelector(".form-submit-btn");
    btn.textContent = "Logging in...";
    btn.disabled = true;

    fetch(API + "/signin", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email, password: password })
    })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        btn.textContent = "Login →";
        btn.disabled = false;

        if (data.userId) {
          localStorage.setItem("userId", data.userId);
          localStorage.setItem("email", email);
          showMsg("Login successful! Redirecting...", false);
          setTimeout(function () {
            window.location.href = "index.html";
          }, 800);
        } else {
          showMsg(data.msg || "Login failed. Please try again.", true);
        }
      })
      .catch(function () {
        btn.textContent = "Login →";
        btn.disabled = false;
        showMsg("Network error. Is the server running on port 5000?", true);
      });
  }

  // Login on Enter key
  document.addEventListener("keydown", function (e) {
    if (e.key === "Enter") doLogin();
  });
</script>

</body>
</html>
