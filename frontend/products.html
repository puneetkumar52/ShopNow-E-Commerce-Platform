<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products - Bada Bazar</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .filter-bar {
      background: white;
      padding: 16px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 12px;
    }
    .filter-bar select {
      border: 2px solid var(--border);
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      outline: none;
      font-weight: 600;
      color: var(--dark);
      cursor: pointer;
      transition: border 0.2s;
    }
    .filter-bar select:focus {
      border-color: var(--orange);
    }
    .result-count {
      font-size: 14px;
      color: var(--gray);
      font-weight: 600;
    }
  </style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
  <div class="navbar-brand">Bada <span>Bazar</span></div>

  <ul class="navbar-links">
    <li><a href="index.html">🏠 Home</a></li>
    <li><a href="products.html" class="active">🛍️ Products</a></li>
    <li><a href="cart.html">🛒 Cart</a></li>
  </ul>

  <div class="navbar-right">
    <span id="nav-user" class="auth-btn hidden" style="color: #aaa; font-size:13px;"></span>
    <a id="nav-login" href="login.html"><button class="auth-btn">Login</button></a>
    <a id="nav-signup" href="signup.html"><button class="btn-primary" style="padding:7px 16px; font-size:14px;">Sign Up</button></a>
    <button id="nav-logout" class="logout-btn hidden" onclick="logout()">Logout</button>
    <a href="cart.html" class="cart-btn">
      🛒 Cart <span class="cart-count" id="cart-count">0</span>
    </a>
  </div>
</nav>

<!-- ===== SEARCH ===== -->
<div class="search-section">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Search for products..." />
    <button onclick="doSearch()">Search 🔍</button>
  </div>
</div>

<!-- ===== FILTER BAR ===== -->
<div class="filter-bar">
  <div class="categories-section" style="padding:0; flex-wrap:wrap; gap:8px; display:flex; align-items:center;">
    <span style="font-weight:700; color:var(--gray); font-size:14px;">Filter:</span>
    <button class="cat-pill active" onclick="filterCat(this, '')">All</button>
    <button class="cat-pill" onclick="filterCat(this, 'electronics')">📱 Electronics</button>
    <button class="cat-pill" onclick="filterCat(this, 'clothing')">👕 Clothing</button>
    <button class="cat-pill" onclick="filterCat(this, 'shoes')">👟 Shoes</button>
    <button class="cat-pill" onclick="filterCat(this, 'watches')">⌚ Watches</button>
    <button class="cat-pill" onclick="filterCat(this, 'books')">📚 Books</button>
    <button class="cat-pill" onclick="filterCat(this, 'sports')">⚽ Sports</button>
    <button class="cat-pill" onclick="filterCat(this, 'beauty')">💄 Beauty</button>
  </div>
  <div style="display:flex; align-items:center; gap:12px;">
    <span class="result-count" id="result-count">Loading...</span>
    <select id="sort-select" onchange="sortProducts()">
      <option value="">Sort by</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="rating">Best Rating</option>
    </select>
  </div>
</div>

<!-- ===== PRODUCTS ===== -->
<div class="products-section">
  <div class="section-title" id="section-title">🛍️ All Products</div>
  <div id="products-container">
    <div class="loading">
      <div class="spinner"></div>
      <span>Loading products...</span>
    </div>
  </div>
</div>

<!-- ===== FOOTER ===== -->
<footer>
  Made with ❤️ by a student &nbsp;|&nbsp; <span>Bada Bazar</span> &copy; 2024
</footer>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script src="common.js"></script>
<script>
  var allProducts = [];
  var displayProducts = [];

  function loadProducts() {
    fetch(API + "/api/products")
      .then(function (res) { return res.json(); })
      .then(function (data) {
        allProducts = data;
        displayProducts = data;
        renderProducts(data);
        updateCount(data.length);
      })
      .catch(function () {
        document.getElementById("products-container").innerHTML =
          '<div class="empty-state"><div class="emoji">😕</div><h3>Could not load products</h3><p>Make sure the backend server is running on port 5000</p></div>';
      });
  }

  function updateCount(n) {
    document.getElementById("result-count").textContent = n + " product" + (n !== 1 ? "s" : "") + " found";
  }

  function renderProducts(products) {
    var container = document.getElementById("products-container");

    if (!products || products.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="emoji">🕵️</div><h3>No products found</h3><p>Try searching something else</p></div>';
      updateCount(0);
      return;
    }

    updateCount(products.length);

    var html = '<div class="products-grid">';
    products.forEach(function (p) {
      var emoji = getCategoryEmoji(p.category);
      var imgHTML = p.image
        ? '<img src="' + p.image + '" alt="' + p.name + '" onerror="this.style.display=\'none\'; this.nextElementSibling.style.display=\'flex\'">' +
          '<div class="product-img-placeholder" style="display:none">' + emoji + '</div>'
        : '<div class="product-img-placeholder">' + emoji + '</div>';

      var stockHTML = p.stock > 0
        ? '<div class="product-stock in-stock">✅ In Stock (' + p.stock + ')</div>'
        : '<div class="product-stock out-stock">❌ Out of Stock</div>';

      var btnDisabled = p.stock <= 0 ? "disabled" : "";

      html += '<div class="product-card">';
      html += imgHTML;
      html += '<div class="product-info">';
      html += '<div class="product-category">' + (p.category || "General") + '</div>';
      html += '<div class="product-name">' + p.name + '</div>';
      html += '<div class="product-price">₹' + p.price + ' <span>MRP</span></div>';
      if (p.rating) {
        html += '<div class="product-rating"><span class="stars">' + getStars(p.rating) + '</span> ' + p.rating + '</div>';
      }
      html += stockHTML;
      if (p.description) {
        html += '<p style="font-size:12px; color:var(--gray); margin-top:4px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">' + p.description + '</p>';
      }
      html += '<button class="add-to-cart-btn" ' + btnDisabled + ' onclick=\'addToCart(' + JSON.stringify(p) + ')\'>Add to Cart 🛒</button>';
      html += '</div></div>';
    });
    html += '</div>';
    container.innerHTML = html;
  }

  function filterCat(btn, cat) {
    document.querySelectorAll(".cat-pill").forEach(function (el) { el.classList.remove("active"); });
    btn.classList.add("active");

    document.getElementById("sort-select").value = "";

    if (!cat) {
      displayProducts = allProducts;
    } else {
      displayProducts = allProducts.filter(function (p) {
        return (p.category || "").toLowerCase().includes(cat);
      });
    }

    var label = cat ? "📦 " + cat.charAt(0).toUpperCase() + cat.slice(1) : "🛍️ All Products";
    document.getElementById("section-title").textContent = label;
    renderProducts(displayProducts);
  }

  function sortProducts() {
    var val = document.getElementById("sort-select").value;
    var sorted = displayProducts.slice(); // copy

    if (val === "price-asc") {
      sorted.sort(function (a, b) { return a.price - b.price; });
    } else if (val === "price-desc") {
      sorted.sort(function (a, b) { return b.price - a.price; });
    } else if (val === "rating") {
      sorted.sort(function (a, b) { return (b.rating || 0) - (a.rating || 0); });
    }
    renderProducts(sorted);
  }

  function doSearch() {
    var q = document.getElementById("search-input").value.trim();
    if (!q) {
      displayProducts = allProducts;
      renderProducts(allProducts);
      return;
    }

    fetch(API + "/api/products/search?q=" + encodeURIComponent(q))
      .then(function (res) { return res.json(); })
      .then(function (data) {
        displayProducts = data;
        renderProducts(data);
        document.getElementById("section-title").textContent = '🔍 Results for "' + q + '"';
      })
      .catch(function () {
        showToast("Search failed", "error");
      });
  }

  document.getElementById("search-input").addEventListener("keydown", function (e) {
    if (e.key === "Enter") doSearch();
  });

  loadProducts();
</script>

</body>
</html>
