<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - Bada Bazar</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="logo">Bada <span>Bazar</span></div>
  <div class="subtitle">Create a new account 🎉</div>

  <div class="msg-box" id="msg-box"></div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="abc@gmail.com" />
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Create a strong password" />
  </div>

  <div class="form-group">
    <label>Confirm Password</label>
    <input type="password" id="confirm-password" placeholder="Re-enter your password" />
  </div>

  <button class="form-submit-btn" onclick="doSignup()">Create Account →</button>

  <div class="auth-switch">
    Already have an account? <a href="login.html">Login here</a>
  </div>

  <div style="text-align:center; margin-top:14px;">
    <a href="index.html" style="font-size:13px; color:var(--gray);">← Back to Home</a>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script src="common.js"></script>
<script>
  // If already logged in, redirect
  if (getUser()) {
    window.location.href = "index.html";
  }

  function showMsg(text, isError) {
    var box = document.getElementById("msg-box");
    box.textContent = text;
    box.className = "msg-box " + (isError ? "msg-error" : "msg-success");
    box.style.display = "block";
  }

  function doSignup() {
    var email = document.getElementById("email").value.trim();
    var password = document.getElementById("password").value;
    var confirm = document.getElementById("confirm-password").value;

    if (!email || !password || !confirm) {
      showMsg("Please fill in all fields", true);
      return;
    }

    if (password !== confirm) {
      showMsg("Passwords do not match!", true);
      return;
    }

    if (password.length < 6) {
      showMsg("Password must be at least 6 characters", true);
      return;
    }

    var btn = document.querySelector(".form-submit-btn");
    btn.textContent = "Creating account...";
    btn.disabled = true;

    fetch(API + "/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email, password: password })
    })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        btn.textContent = "Create Account →";
        btn.disabled = false;

        if (data.msg === "Signup Successful") {
          showMsg("Account created! Please login now 🎉", false);
          setTimeout(function () {
            window.location.href = "login.html";
          }, 1200);
        } else {
          showMsg(data.msg || "Signup failed. Please try again.", true);
        }
      })
      .catch(function () {
        btn.textContent = "Create Account →";
        btn.disabled = false;
        showMsg("Network error. Is the server running on port 5000?", true);
      });
  }

  document.addEventListener("keydown", function (e) {
    if (e.key === "Enter") doSignup();
  });
</script>

</body>
</html>
